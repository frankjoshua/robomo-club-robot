version: '3'

# Purge orphaned Fast DDS /dev/shm segments before any node starts (prevents the
# OOM that kills rosbridge on restart). See docker-compose-dds-clean.yml.
include:
  - docker-compose-dds-clean.yml

x-common: &common
  network_mode: host
  ipc: host
  pid: host
  restart: unless-stopped
  depends_on:
    dds_shm_clean:
      condition: service_completed_successfully
  logging:
    driver: json-file
    options:
      max-size: '10m'
      max-file: '3'
  deploy:
    resources:
      limits:
        memory: 3g
  shm_size: 3g

services:
  ros2_bridge_suite:
    <<: *common
    container_name: ros2_bridge_suite
    image: frankjoshua/ros2-bridge-suite

  ros2_mcp_server:
    <<: *common
    container_name: ros_mcp_server
    image: frankjoshua/ros-mcp-server

  ros2_slam_toolbox:
    <<: *common
    container_name: ros2_slam_toolbox
    image: frankjoshua/ros2-slamtoolbox

  ros2_nav:
    <<: *common
    container_name: ros2_nav
    # The image launches nav2 composed (one process / one DDS participant) by default;
    # separate-process bringup OOMs the cap, composed it settles ~88 MB. See docker-ros2-nav2.
    image: frankjoshua/ros2-nav2

  ros2_diff_drive_controller:
    <<: *common
    container_name: ros2_diff_drive_controller
    image: frankjoshua/ros2-diff-drive-controller
    privileged: true

  ros2_urdf:
    <<: *common
    container_name: ros2_urdf
    image: frankjoshua/ros2-urdf
