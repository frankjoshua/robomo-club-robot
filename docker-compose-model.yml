# docker-compose-model.yml
#
# Loads the Blender-built robot model (model/robomo.urdf + model/meshes/) into the running
# stack and serves the meshes over HTTP so Foxglove Studio (and RViz) can display the robot.
#
# rosbridge cannot resolve package:// mesh URIs, so the URDF references
# http://localhost:8100/robomo.dae and the model_meshes service below serves model/meshes/.
#
# Layer it on top of the ros + mock-hardware stacks (the mock_ydlidar override below needs
# that service to exist):
#   docker compose -f docker-compose-ros.yml -f docker-compose-mock-hardware.yml -f docker-compose-model.yml up -d
#
# Then in Foxglove: connect to ws://localhost:9090, add a 3D panel, and add the URDF from the
# /robot_description topic (see model/README.md).

services:
  # Point robot_state_publisher at the Blender-built URDF (bind-mount; no image rebuild).
  ros2_urdf:
    volumes:
      - ./model:/model:ro
    command: ["/bin/bash", "-i", "-c", "ros2 launch /model/rsp.launch.py"]

  # The URDF now owns base_link->laser_frame at the real ~1.23 m scan height, so stop the
  # mock lidar from also publishing that static transform.
  mock_ydlidar_x4:
    environment:
      PUBLISH_LASER_TF: "false"

  # Static HTTP server for the meshes (Foxglove fetches them by URL). Reuses the already-pulled
  # ros image; only needs the host network so the port is reachable at localhost:8100.
  model_meshes:
    image: ros:humble-ros-base
    container_name: model_meshes
    network_mode: host
    restart: unless-stopped
    volumes:
      - ./model/meshes:/meshes:ro
      - ./model/serve_meshes.py:/serve_meshes.py:ro
    command: ["python3", "/serve_meshes.py"]
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'
